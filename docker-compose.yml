services:
  traefik:
    image: traefik:v3.6
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    restart: unless-stopped

  mcp:
    build: .
    command: uv run uvicorn pravni_kvalifikator.mcp.server:app --host 0.0.0.0 --port 8001
    env_file: .env
    environment:
      MCP_SERVER_HOST: "0.0.0.0"
      MCP_SERVER_PORT: "8001"
      MCP_ALLOWED_HOSTS: "mcp,mcp:8001"
      LAWS_DB_PATH: /app/data/laws.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  web:
    build: .
    command: uv run pq-web
    env_file: .env
    environment:
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8000"
      MCP_SERVER_URL: "http://mcp:8001"
      LAWS_DB_PATH: /app/data/laws.db
      SESSIONS_DB_PATH: /app/data/sessions.db
    volumes:
      - ./data:/app/data
    depends_on:
      - mcp
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.pravni-kvalifikator.rule: "Host(`pravni-kvalifikator.cloudfield.dev`)"
      traefik.http.routers.pravni-kvalifikator.entrypoints: "websecure"
      traefik.http.routers.pravni-kvalifikator.tls.certresolver: "letsencrypt"
      traefik.http.services.pravni-kvalifikator.loadbalancer.server.port: "8000"

volumes:
  letsencrypt:
